<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- style -->
     <link rel="stylesheet" href="style.css">
    <!-- taildwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisy ui  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontawsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <body>

     <div class="contentBody w-11/12 h-full mx-auto bg-amber-50 p-4 ">

        <header class="mx-8   p-5 border-gray-400 border-b-2">
            <h1 class="mb-3 text-blue-950 font-bold text-2xl">Job Application Tracker</h1>        
                <div class="headerDiv grid grid-cols-3">

                    <div id="total" class=" bg-base-200 w-80 h-20 shadow-md">
                        <h1 class="ml-4 mt-2">total</h1>
                        <h1 class=" ml-4 mt-2 font-bold">8</h1>
                    </div>
                    <div id="interview" class=" bg-base-200 w-80 h-20 shadow-md ">
                        <h1 class="ml-4 mt-2">interview</h1>
                        <h1 class=" ml-4 mt-2 font-bold text-green-500">0</h1>
                    </div>
                    <div id="rejected" class=" bg-base-200 w-80 h-20 shadow-md ">
                        <h1 class="ml-4 mt-2">rejected</h1>
                        <h1 class=" ml-4 mt-2 font-bold text-red-500">0</h1>
                    </div>
                </div>
        </header>

     </div>

       
        
    
    
    
    
    </body>
    

</head>

</html>
